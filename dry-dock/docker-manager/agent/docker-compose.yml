services:
  drydock-agent:
    build: .
    image: drydock-agent:latest
    container_name: drydock-agent
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      # Generate your own — must match what you enter in the manager's
      # environment wizard ("Self-hosted Dry Dock manager" / agent type).
      - AGENT_TOKEN=changeme-generate-a-real-secret
      # - LOG_LEVEL=info
      # - LOG_JSON=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
